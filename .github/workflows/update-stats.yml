name: Update org stats

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/update_stats.py
      - .github/workflows/update-stats.yml
      - profile/README.md

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh stats
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_READ_TOKEN || secrets.GITHUB_TOKEN }}
          ORG: Conflux-Union
          WINDOW_DAYS: "30"
        run: python scripts/update_stats.py

      - name: Commit changes
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet profile/README.md profile/stats.json; then
            echo "no changes"
            exit 0
          fi
          git add profile/README.md profile/stats.json
          git commit -m "chore(stats): refresh org commit stats"
          git push
